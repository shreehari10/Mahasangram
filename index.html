<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAHASANGRAM - AVCOE General Championship</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="home-container">
        <header class="page-header-home">
            <div class="header-content">
                <h1 class="main-title">MAHASANGRAM</h1>
                <h2 class="subtitle">AVCOE General Championship</h2>
            </div>
        </header>

        <div class="content-wrapper">
            <!-- Leaderboard Section -->
            <section class="leaderboard-section">
                <div class="section-header">
                    <h2>🏆 Live Leaderboard</h2>
                </div>
                <div id="leaderboard-container" class="leaderboard-container-home">
                    <div class="data-loading">
                        <div class="spinner"></div>
                        <p>Loading leaderboard...</p>
                    </div>
                </div>
            </section>

            <!-- Sports Button -->
            <div class="sports-nav-section">
                <a href="sports.html" class="sports-nav-btn">
                    <span class="btn-icon">⚽</span>
                    <span class="btn-text">View Sports Results</span>
                </a>
            </div>

            <!-- Departments Section -->
            <section class="departments-section">
                <h2>Participating Departments</h2>
                <div class="departments-grid">
                    <div class="dept-badge">IT</div>
                    <div class="dept-badge">MECH</div>
                    <div class="dept-badge">CIVIL</div>
                    <div class="dept-badge">A&R</div>
                    <div class="dept-badge">COMP</div>
                    <div class="dept-badge">AI&DS</div>
                    <div class="dept-badge">MBA</div>
                    <div class="dept-badge">ENTC</div>
                    <div class="dept-badge">ECE</div>
                    <div class="dept-badge">ELECT</div>
                </div>
            </section>
        </div>

        <footer class="footer">
            <p>Follow us on Instagram: <strong>@AVCOE_Championships</strong></p>
            <p>&copy; 2026 MAHASANGRAM | AVCOE General Championship</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
