<!DOCTYPE html>

<head>

    <title>Sports Results - MAHASANGRAM</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="sports-page-container">
        <header class="page-header-sports">
            <div class="header-nav">
                <a href="index.html" class="back-link">← Back to Home</a>
            </div>
            <div class="header-content">
                <h1>⚽ Sports Results</h1>
                <p>Click on a sport to view results</p>
            </div>
        </header>

        <div class="content-wrapper">
            <!-- Sports Buttons Section -->
            <section class="sports-buttons-section">
                <div id="sports-buttons-container" class="sports-buttons-grid">
                    <div class="data-loading">
                        <div class="spinner"></div>
                        <p>Loading sports...</p>
                    </div>
                </div>
            </section>

            <!-- Results Section -->
            <section id="results-section" class="results-section">
                <!-- Results will be displayed here dynamically -->
            </section>
        </div>

        <footer class="footer">
            <p>Follow us on Instagram: <strong>@AVCOE_Championships</strong></p>
